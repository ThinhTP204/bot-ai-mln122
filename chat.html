<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Interface</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f5f7fb;
    }

    .chat-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .chat-header {
      height: 70px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .brand-text h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .brand-text p {
      font-size: 12px;
      opacity: 0.8;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
    }

    .chat-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      .chat-header {
        padding: 0 16px;
      }

      .brand-text h1 {
        font-size: 16px;
      }

      .status {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">

    <div class="chat-container">
      <iframe
        src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/04/23/15/20260423151813-RGBQISNB.json"
        allow="microphone"
      ></iframe>
    </div>
  </div>
</body>
</html>
